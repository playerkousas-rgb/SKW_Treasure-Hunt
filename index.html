<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKW Dragon Radar - Smart Media v5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --radar-bg: #0a2b16;
            --radar-grid: #1e6b3a;
            --radar-glow: #39ff14;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'Noto Sans TC', sans-serif;
            color: var(--radar-glow);
        }

        .radar-container {
            width: 100vw; height: 100vh;
            background-color: var(--radar-bg);
            background-image: 
                linear-gradient(var(--radar-grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--radar-grid) 1px, transparent 1px);
            position: relative; overflow: hidden;
            background-size: 10% 10%;
        }

        .scanning-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(57, 255, 20, 0.05));
            border-bottom: 1px solid var(--radar-glow);
            animation: scan-move 4s infinite linear;
            pointer-events: none; z-index: 10;
        }

        @keyframes scan-move {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .radar-item {
            position: absolute; transform: translate(-50%, -50%);
            display: flex; align-items: center; justify-content: center;
            animation: blink 0.8s infinite alternate; z-index: 20;
        }

        .item-dot { width: 18px; height: 18px; background: #ff3e3e; border-radius: 50%; box-shadow: 0 0 15px #ff0000; border: 2px solid white; }
        
        @keyframes blink {
            from { opacity: 0.4; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
        }

        .ui-overlay {
            position: absolute; inset: 0; z-index: 50;
            pointer-events: none; padding: 20px;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .ui-element { pointer-events: auto; }

        .radar-btn {
            background: rgba(0,30,0,0.85);
            border: 1px solid var(--radar-glow);
            color: var(--radar-glow);
            padding: 8px 12px; font-size: 12px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .radar-btn:active { transform: scale(0.95); background: var(--radar-glow); color: black; }

        .modal {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,10,5,0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 25px; text-align: center;
        }

        .hidden { display: none !important; }

        .pattern-content {
            font-size: 80px;
            margin: 20px 0;
            filter: drop-shadow(0 0 10px var(--radar-glow));
            max-width: 100%;
        }

        .text-content { font-size: 28px; font-weight: 900; color: white; line-height: 1.4; }

        .admin-card { background: #111; border: 1px solid #333; padding: 12px; border-radius: 10px; }
        .tab-btn { flex: 1; padding: 10px; font-size: 12px; border-bottom: 2px solid transparent; opacity: 0.5; }
        .tab-active { border-bottom-color: var(--radar-glow); color: var(--radar-glow); opacity: 1; }
        
        #previewContainer img { max-width: 100%; max-height: 120px; object-fit: contain; border-radius: 4px; }
    </style>
</head>
<body>

    <!-- 啟動螢幕 -->
    <div id="bootScreen" class="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center p-10">
        <div class="w-32 h-32 border-4 border-green-900 rounded-full flex items-center justify-center mb-8 relative">
            <div class="absolute inset-0 border-t-4 border-green-400 rounded-full animate-spin"></div>
            <span class="text-4xl">🛰️</span>
        </div>
        <h1 class="text-2xl font-black mb-2 tracking-[0.2em] text-green-500 italic">SKW RADAR SYSTEM</h1>
        <p class="text-[10px] text-green-800 mb-8 font-mono">MISSION MEDIA CENTER V5.0</p>
        <input type="text" id="missionIdInput" placeholder="輸入任務頻道 ID" 
            class="bg-transparent border-b-2 border-green-900 text-center text-2xl outline-none w-full max-w-xs mb-8 uppercase text-white pb-2 focus:border-green-400">
        <button onclick="startMission()" class="radar-btn w-full max-w-xs py-4 text-lg font-bold">同步衛星數據</button>
    </div>

    <!-- 雷達主介面 -->
    <div id="radarMain" class="hidden">
        <div class="radar-container" id="gridContainer">
            <div class="absolute top-1/2 left-0 w-full h-[1px] bg-green-500/20"></div>
            <div class="absolute left-1/2 top-0 w-[1px] h-full bg-green-500/20"></div>
            <div class="scanning-line"></div>
            <div id="itemsContainer"></div>
        </div>

        <div class="ui-overlay">
            <div class="flex justify-between items-start">
                <div>
                    <div class="text-[10px] opacity-40 uppercase">Channel</div>
                    <div id="currentMissionId" class="text-xl font-black text-green-400">---</div>
                </div>
                <button onclick="openLeaderAuth()" class="radar-btn ui-element">領袖控制台</button>
            </div>
            
            <div class="flex justify-between items-end">
                <div class="flex flex-col gap-2 ui-element">
                    <button onclick="changeZoom(1)" id="z1" class="radar-btn">1x</button>
                    <button onclick="changeZoom(5)" id="z5" class="radar-btn border-white text-white">5x</button>
                </div>
                <div class="text-right">
                    <div class="text-[10px] opacity-40 uppercase">Stations</div>
                    <div id="objCount" class="text-4xl font-black">00</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 到達目標彈窗 (成員視角) -->
    <div id="collectModal" class="modal hidden">
        <div class="text-xs text-green-500 mb-4 tracking-widest uppercase">Target Found</div>
        <div id="patternDisplay" class="pattern-content flex items-center justify-center w-full"></div>
        <div id="patternLabel" class="text-green-400 font-mono mb-8 text-sm bg-green-900/20 px-3 py-1 rounded">STATION: ---</div>
        <button onclick="closeCollectModal()" class="radar-btn px-12 py-4 text-lg font-bold">接收數據並返回</button>
    </div>

    <!-- 領袖控制台 -->
    <div id="leaderPanel" class="fixed inset-0 z-[200] bg-black hidden flex flex-col p-5 overflow-y-auto">
        <div id="authBox" class="flex-grow flex flex-col items-center justify-center">
            <h2 class="text-xl mb-6 font-bold tracking-widest">領袖驗證</h2>
            <input type="password" id="leaderPass" placeholder="輸入管理密碼" class="bg-transparent border-b border-green-800 text-center text-2xl w-64 mb-8 outline-none text-white">
            <div class="flex gap-4 w-64">
                <button onclick="closeLeader()" class="flex-1 radar-btn">退出</button>
                <button onclick="verifyLeader()" class="flex-1 radar-btn bg-green-800 border-none text-white">進入管理</button>
            </div>
        </div>

        <div id="dropBox" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold">投放資源</h2>
                <span class="text-xs text-gray-500">MISSION: <span id="adminMid"></span></span>
            </div>

            <div class="flex bg-gray-900 rounded-lg p-1">
                <button onclick="switchMode('emoji')" id="m-emoji" class="tab-btn tab-active">Emoji</button>
                <button onclick="switchMode('text')" id="m-text" class="tab-btn">文字</button>
                <button onclick="switchMode('image')" id="m-image" class="tab-btn">圖片</button>
            </div>

            <div class="admin-card">
                <div id="emojiSection" class="grid grid-cols-5 gap-2"></div>
                
                <div id="textSection" class="hidden">
                    <textarea id="customTextInput" rows="3" placeholder="輸入任務提示、密碼或座標訊息..." 
                        class="w-full bg-black border border-gray-700 p-3 rounded text-white text-sm focus:border-green-500 outline-none"></textarea>
                </div>
                
                <div id="imageSection" class="hidden space-y-3">
                    <div class="text-[10px] text-gray-400 mb-1">建議使用 Postimages 取得直接連結</div>
                    <input type="text" id="imageLinkInput" oninput="previewImage(this.value)" placeholder="貼上圖片 URL (例如 .jpg, .png)" 
                        class="w-full bg-black border border-gray-700 p-3 rounded text-white text-sm focus:border-green-500 outline-none">
                    <div id="previewContainer" class="bg-black/50 border border-dashed border-gray-800 rounded min-h-[100px] flex items-center justify-center overflow-hidden">
                        <span class="text-gray-700 text-xs italic">圖片預覽區</span>
                    </div>
                </div>
            </div>

            <button onclick="dropItem()" class="w-full bg-green-600 text-black font-black py-5 rounded-xl active:scale-95 transition-transform shadow-lg shadow-green-900/20">
                在目前位置投放站點
            </button>

            <div>
                <h3 class="text-[10px] font-bold text-gray-500 uppercase mb-3 tracking-widest">已部署站點</h3>
                <div id="droppedList" class="space-y-2"></div>
            </div>

            <button onclick="closeLeader()" class="w-full text-gray-600 text-xs py-8">關閉面板</button>
        </div>
    </div>

    <script>
        const DEFAULT_EMOJIS = ["🔴", "⭐", "💎", "🔥", "⚡", "🍀", "🌀", "🛡️", "🔑", "🛸", "🐲", "🧿", "🎁", "🚩", "🧭"];
        let currentMission = "";
        let allData = JSON.parse(localStorage.getItem('skw_radar_v50')) || {};
        let userPos = null;
        let zoom = 5;
        let dropType = 'emoji';
        let selectedEmojiIdx = 0;
        let foundIds = new Set();

        // 核心邏輯：自動轉換 Google Drive 或 預覽
        function fixImageUrl(url) {
            if (!url) return "";
            if (url.includes("drive.google.com/file/d/")) {
                const idMatch = url.match(/\/d\/(.+?)\//) || url.match(/\/d\/(.+?)$/);
                if (idMatch && idMatch[1]) {
                    return `https://lh3.googleusercontent.com/u/0/d/${idMatch[1].split('?')[0]}`;
                }
            }
            return url;
        }

        function previewImage(url) {
            const container = document.getElementById('previewContainer');
            if (!url) {
                container.innerHTML = '<span class="text-gray-700 text-xs italic">圖片預覽區</span>';
                return;
            }
            const cleanUrl = fixImageUrl(url);
            container.innerHTML = `<img src="${cleanUrl}" alt="Preview" onerror="this.parentElement.innerHTML='<span class=\'text-red-900 text-xs\'>網址錯誤或不支援</span>'">`;
        }

        function initAdminUI() {
            const grid = document.getElementById('emojiSection');
            grid.innerHTML = '';
            DEFAULT_EMOJIS.forEach((p, i) => {
                const btn = document.createElement('button');
                btn.className = `p-2 border border-gray-800 rounded text-2xl transition-all ${i === 0 ? 'bg-green-900 border-green-500' : 'bg-black'}`;
                btn.innerHTML = p;
                btn.onclick = () => {
                    selectedEmojiIdx = i;
                    document.querySelectorAll('#emojiSection button').forEach(b => b.classList.remove('bg-green-900', 'border-green-500'));
                    btn.classList.add('bg-green-900', 'border-green-500');
                };
                grid.appendChild(btn);
            });
        }

        function switchMode(mode) {
            dropType = mode;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(`m-${mode}`).classList.add('tab-active');
            document.getElementById('emojiSection').classList.toggle('hidden', mode !== 'emoji');
            document.getElementById('textSection').classList.toggle('hidden', mode !== 'text');
            document.getElementById('imageSection').classList.toggle('hidden', mode !== 'image');
        }

        function startMission() {
            const id = document.getElementById('missionIdInput').value.trim().toUpperCase();
            if (!id) return;
            currentMission = id;
            document.getElementById('currentMissionId').innerText = id;
            document.getElementById('adminMid').innerText = id;
            document.getElementById('bootScreen').classList.add('hidden');
            document.getElementById('radarMain').classList.remove('hidden');
            initGPS();
        }

        function initGPS() {
            if (!navigator.geolocation) return;
            navigator.geolocation.watchPosition(p => {
                userPos = { lat: p.coords.latitude, lng: p.coords.longitude };
                checkArrival();
                updateRadar();
            }, null, { enableHighAccuracy: true });
        }

        function checkArrival() {
            if (!userPos || !allData[currentMission]) return;
            allData[currentMission].forEach(item => {
                const dist = calculateDistance(userPos.lat, userPos.lng, item.lat, item.lng);
                if (dist < 15 && !foundIds.has(item.id)) {
                    showCollection(item);
                    foundIds.add(item.id);
                }
            });
        }

        function showCollection(item) {
            const display = document.getElementById('patternDisplay');
            display.innerHTML = '';
            
            if (item.type === 'emoji') {
                display.className = 'pattern-content';
                display.innerText = DEFAULT_EMOJIS[item.content];
            } else if (item.type === 'text') {
                display.className = 'pattern-content text-content';
                display.innerText = item.content;
            } else if (item.type === 'image') {
                display.className = 'pattern-content p-2';
                const img = document.createElement('img');
                img.src = item.content;
                img.className = 'max-h-[40vh] w-auto rounded-lg border-2 border-white shadow-2xl';
                display.appendChild(img);
            }
            
            document.getElementById('patternLabel').innerText = `STATION: ${item.id.toString().slice(-4)}`;
            document.getElementById('collectModal').classList.remove('hidden');
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        }

        function closeCollectModal() {
            document.getElementById('collectModal').classList.add('hidden');
        }

        function openLeaderAuth() {
            document.getElementById('leaderPanel').classList.remove('hidden');
            document.getElementById('authBox').classList.remove('hidden');
            document.getElementById('dropBox').classList.add('hidden');
            refreshDroppedList();
        }

        function verifyLeader() {
            if (document.getElementById('leaderPass').value === '1234') {
                document.getElementById('authBox').classList.add('hidden');
                document.getElementById('dropBox').classList.remove('hidden');
            }
        }

        function dropItem() {
            if (!userPos) return alert("等待 GPS 訊號...");
            let content = "";
            
            if (dropType === 'emoji') content = selectedEmojiIdx;
            else if (dropType === 'text') {
                content = document.getElementById('customTextInput').value.trim();
                if (!content) return;
            }
            else if (dropType === 'image') {
                content = fixImageUrl(document.getElementById('imageLinkInput').value.trim());
                if (!content) return;
            }

            if (!allData[currentMission]) allData[currentMission] = [];
            allData[currentMission].push({
                id: Date.now(),
                lat: userPos.lat,
                lng: userPos.lng,
                type: dropType,
                content: content
            });
            
            localStorage.setItem('skw_radar_v50', JSON.stringify(allData));
            updateRadar();
            refreshDroppedList();
            
            // 重置
            document.getElementById('customTextInput').value = "";
            document.getElementById('imageLinkInput').value = "";
            previewImage("");
        }

        function refreshDroppedList() {
            const list = document.getElementById('droppedList');
            list.innerHTML = '';
            (allData[currentMission] || []).forEach((item, index) => {
                const row = document.createElement('div');
                row.className = 'bg-gray-900/50 p-3 rounded flex justify-between items-center border border-gray-800';
                row.innerHTML = `
                    <div class="text-[10px]">
                        <span class="text-green-500 font-bold">#${index+1}</span> 
                        <span class="text-gray-300 ml-2 uppercase">${item.type}</span>
                    </div>
                    <button onclick="removeItem(${item.id})" class="text-red-900 text-[10px] border border-red-900 px-2 py-1 rounded">刪除</button>
                `;
                list.appendChild(row);
            });
        }

        function removeItem(id) {
            allData[currentMission] = allData[currentMission].filter(i => i.id !== id);
            localStorage.setItem('skw_radar_v50', JSON.stringify(allData));
            refreshDroppedList();
            updateRadar();
        }

        function closeLeader() {
            document.getElementById('leaderPanel').classList.add('hidden');
        }

        function updateRadar() {
            if (!userPos) return;
            const container = document.getElementById('itemsContainer');
            container.innerHTML = '';
            const items = allData[currentMission] || [];
            const range = 300 / zoom; 

            items.forEach(item => {
                const dLat = item.lat - userPos.lat;
                const dLng = item.lng - userPos.lng;
                const y = 50 - (dLat * 111320 / range) * 50;
                const x = 50 + (dLng * 111320 * Math.cos(userPos.lat * Math.PI / 180) / range) * 50;
                if (x >= 0 && x <= 100 && y >= 0 && y <= 100) {
                    const el = document.createElement('div');
                    el.className = 'radar-item';
                    el.style.left = `${x}%`; el.style.top = `${y}%`;
                    el.innerHTML = '<div class="item-dot"></div>';
                    container.appendChild(el);
                }
            });
            document.getElementById('objCount').innerText = items.length.toString().padStart(2, '0');
        }

        function changeZoom(z) {
            zoom = z;
            document.querySelectorAll('.radar-btn').forEach(b => b.classList.remove('border-white', 'text-white'));
            document.getElementById(`z${z}`).classList.add('border-white', 'text-white');
            updateRadar();
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const f1 = lat1 * Math.PI/180;
            const f2 = lat2 * Math.PI/180;
            const df = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(df/2)*Math.sin(df/2) + Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)*Math.sin(dl/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        initAdminUI();
    </script>
</body>
</html>
