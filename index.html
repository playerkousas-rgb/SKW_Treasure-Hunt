<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKW Cloud Radar - 雲端雷達系統</title>
    <!-- 載入必要腳本 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide-react/0.263.0/lucide.min.css" rel="stylesheet">

    <style>
        @keyframes radar-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .radar-line {
            animation: radar-spin 4s linear infinite;
        }
        body { 
            background-color: #020617; 
            color: #f8fafc; 
            margin: 0; 
            overflow: hidden; 
            font-family: system-ui, -apple-system, sans-serif;
        }
        .scanner-glow {
            background: radial-gradient(circle, rgba(34, 197, 94, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Firebase 模擬與配置 (請替換為你的實際配置)
        // 這裡預留了 Firebase 的載入邏輯，但為了確保能直接開啟，先實作核心 UI 與 GPS 功能
        
        const App = () => {
            const [isStarted, setIsStarted] = useState(false);
            const [missionId, setMissionId] = useState('');
            const [userPos, setUserPos] = useState(null);
            const [zoom, setZoom] = useState(5);
            const [stations, setStations] = useState([]);
            const [error, setError] = useState(null);

            // 啟動 GPS 監控
            useEffect(() => {
                if (!isStarted) return;

                if (!navigator.geolocation) {
                    setError("您的瀏覽器不支持 GPS 定位");
                    return;
                }

                const watchId = navigator.geolocation.watchPosition(
                    (p) => {
                        setUserPos({ lat: p.coords.latitude, lng: p.coords.longitude });
                        console.log("位置更新:", p.coords.latitude, p.coords.longitude);
                    },
                    (err) => {
                        setError("無法取得定位權限，請檢查瀏覽器設定。");
                        console.error(err);
                    },
                    { enableHighAccuracy: true }
                );

                return () => navigator.geolocation.clearWatch(watchId);
            }, [isStarted]);

            // 計算兩點距離 (Haversine formula)
            const calculateDistance = (lat1, lon1, lat2, lon2) => {
                const R = 6371e3; // 公尺
                const φ1 = lat1 * Math.PI/180;
                const φ2 = lat2 * Math.PI/180;
                const Δφ = (lat2-lat1) * Math.PI/180;
                const Δλ = (lon2-lon1) * Math.PI/180;
                const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                          Math.cos(φ1) * Math.cos(φ2) *
                          Math.sin(Δλ/2) * Math.sin(Δλ/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                return R * c;
            };

            const handleStart = () => {
                if (missionId.trim()) {
                    setIsStarted(true);
                }
            };

            if (!isStarted) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-slate-950">
                        <div className="w-full max-w-md space-y-8 text-center">
                            <h1 className="text-4xl font-black tracking-tighter text-green-500 italic">SKW CLOUD RADAR</h1>
                            <p className="text-slate-400 text-sm">請輸入任務編號以啟動衛星掃描系統</p>
                            
                            <div className="space-y-4">
                                <input 
                                    type="text" 
                                    value={missionId}
                                    onChange={(e) => setMissionId(e.target.value.toUpperCase())}
                                    placeholder="MISSION ID"
                                    className="w-full bg-transparent border-b-2 border-green-900 text-center text-2xl py-2 outline-none focus:border-green-400 transition-colors text-white uppercase tracking-widest"
                                />
                                <button 
                                    onClick={handleStart}
                                    className="w-full bg-green-600 hover:bg-green-500 text-black font-bold py-4 rounded-lg transition-all active:scale-95 shadow-[0_0_20px_rgba(34,197,94,0.3)]"
                                >
                                    INITIALIZE RADAR
                                </button>
                            </div>
                            
                            {error && <p className="text-red-500 text-sm mt-4 bg-red-500/10 p-2 rounded">{error}</p>}
                        </div>
                    </div>
                );
            }

            return (
                <div className="relative h-screen w-screen overflow-hidden bg-black select-none">
                    {/* 背景網格 */}
                    <div className="absolute inset-0 scanner-glow" />
                    <div 
                        className="absolute inset-0 opacity-20"
                        style={{
                            backgroundImage: `linear-gradient(#166534 1px, transparent 1px), linear-gradient(90deg, #166534 1px, transparent 1px)`,
                            backgroundSize: '40px 40px'
                        }}
                    />

                    {/* 雷達掃描線 */}
                    <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                        <div className="relative w-[150vmax] h-[150vmax] radar-line">
                            <div className="absolute top-1/2 left-1/2 w-1/2 h-[2px] bg-gradient-to-r from-green-500/0 to-green-500 origin-left" />
                        </div>
                    </div>

                    {/* 目標渲染層 */}
                    <div className="absolute inset-0 flex items-center justify-center">
                        {userPos && stations.map((s, idx) => {
                            const range = 500 / zoom; // 根據縮放調整範圍
                            const dLat = s.lat - userPos.lat;
                            const dLng = s.lng - userPos.lng;
                            
                            // 簡易投影計算
                            const x = 50 + (dLng * 111320 / range) * 50;
                            const y = 50 - (dLat * 111320 / range) * 50;

                            if (x < 0 || x > 100 || y < 0 || y > 100) return null;

                            return (
                                <div 
                                    key={idx}
                                    className="absolute w-6 h-6 -ml-3 -mt-3 flex items-center justify-center"
                                    style={{ left: `${x}%`, top: `${y}%` }}
                                >
                                    <span className="text-xl animate-pulse drop-shadow-[0_0_5px_rgba(255,255,255,0.8)]">
                                        {s.emoji || '💎'}
                                    </span>
                                </div>
                            );
                        })}
                        
                        {/* 中心使用者圖標 */}
                        <div className="relative w-4 h-4 bg-white rounded-full shadow-[0_0_15px_white] z-10">
                            <div className="absolute inset-0 animate-ping bg-white rounded-full opacity-50" />
                        </div>
                    </div>

                    {/* 頂部資訊欄 */}
                    <div className="absolute top-0 left-0 w-full p-4 flex justify-between items-start bg-gradient-to-b from-black/80 to-transparent z-20">
                        <div>
                            <h2 className="text-green-500 font-black text-xl italic tracking-tighter">SKW RADAR</h2>
                            <div className="flex items-center gap-2 text-[10px] text-green-700 font-mono">
                                <span className="w-2 h-2 bg-green-500 rounded-full animate-pulse" />
                                SATELLITE SYNC ACTIVE
                            </div>
                        </div>
                        <div className="text-right font-mono">
                            <div className="text-green-500 text-sm">MISSION: {missionId}</div>
                            <div className="text-[10px] text-green-800">
                                {userPos ? `${userPos.lat.toFixed(6)}, ${userPos.lng.toFixed(6)}` : 'WAITING FOR GPS...'}
                            </div>
                        </div>
                    </div>

                    {/* 右側管理按鈕 (模擬管理模式) */}
                    <div className="absolute top-16 right-4 z-20">
                        <button className="bg-black/60 border border-green-900/50 p-2 rounded text-[10px] text-green-800 uppercase hover:text-green-400 transition-colors">
                            Admin Panel
                        </button>
                    </div>

                    {/* 底部縮放控制 */}
                    <div className="absolute bottom-10 left-1/2 -translate-x-1/2 flex gap-4 z-20">
                        {[1, 5, 10, 50].map(z => (
                            <button 
                                key={z}
                                onClick={() => setZoom(z)}
                                className={`w-12 h-12 rounded-full border-2 flex items-center justify-center font-bold transition-all ${
                                    zoom === z 
                                    ? 'bg-green-500 text-black border-white scale-110 shadow-[0_0_15px_rgba(34,197,94,0.5)]' 
                                    : 'bg-black/80 text-green-500 border-green-900 opacity-60'
                                }`}
                            >
                                {z}x
                            </button>
                        ))}
                    </div>

                    {/* 狀態提示 */}
                    <div className="absolute bottom-4 right-4 text-[10px] font-mono text-green-900">
                        v2.5.0-STABLE | CLOUD_SYNC_ENABLED
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
