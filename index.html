<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>尋寶雷達系統</title>
    <!-- 載入必要腳本 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.css" rel="stylesheet">
    <style>
        @keyframes radar-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .radar-line {
            animation: radar-spin 4s linear infinite;
        }
        body { background-color: #020617; color: #f8fafc; margin: 0; overflow: hidden; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 模擬 Lucide 圖標 (因為 CDN 版本稍有不同)
        const Icon = ({ name, className }) => <i data-lucide={name} className={className}></i>;

        function App() {
            const [view, setView] = useState('login'); // login, radar, admin
            const [missionId, setMissionId] = useState('');
            const [userPos, setUserPos] = useState({ lat: 25.0339, lng: 121.5644 }); // 預設台北
            const [treasures, setTreasures] = useState([]);
            const [isLoading, setIsLoading] = useState(true);

            // 模擬系統啟動
            useEffect(() => {
                setTimeout(() => setIsLoading(false), 2000);
            }, []);

            // 模擬獲取地理位置
            useEffect(() => {
                if (navigator.geolocation) {
                    navigator.geolocation.watchPosition(
                        (pos) => setUserPos({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                        (err) => console.log("GPS 無法取得，使用模擬座標")
                    );
                }
            }, []);

            const handleJoin = () => {
                if (missionId) setView('radar');
            };

            if (isLoading) {
                return (
                    <div className="h-screen w-screen flex flex-col items-center justify-center">
                        <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                        <p className="tracking-widest animate-pulse text-blue-400 font-bold">雷達系統啟動中...</p>
                    </div>
                );
            }

            return (
                <div className="h-screen w-screen flex flex-col font-sans">
                    {/* Header */}
                    <header className="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                        <div className="flex items-center gap-2">
                            <div className="w-3 h-3 bg-blue-500 rounded-full animate-pulse"></div>
                            <span className="font-black text-lg">TREASURE RADAR</span>
                        </div>
                        {view !== 'login' && (
                            <button onClick={() => setView('login')} className="text-xs text-slate-500 underline">登出系統</button>
                        )}
                    </header>

                    <main className="flex-1 flex flex-col items-center justify-center p-6 relative">
                        
                        {view === 'login' && (
                            <div className="w-full max-w-sm space-y-6 text-center animate-in fade-in zoom-in duration-500">
                                <div>
                                    <h2 className="text-3xl font-bold mb-2">連結同步器</h2>
                                    <p className="text-slate-400 text-sm">請輸入任務編號以同步衛星數據</p>
                                </div>
                                <input 
                                    type="text" 
                                    className="w-full bg-slate-900 border border-slate-700 p-4 rounded-xl text-center text-xl font-mono uppercase focus:border-blue-500 outline-none"
                                    placeholder="SKW-XXX"
                                    value={missionId}
                                    onChange={(e) => setMissionId(e.target.value.toUpperCase())}
                                />
                                <button 
                                    onClick={handleJoin}
                                    className="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-bold text-lg transition-all active:scale-95"
                                >
                                    開始掃描
                                </button>
                            </div>
                        )}

                        {view === 'radar' && (
                            <div className="flex flex-col items-center w-full">
                                {/* 雷達主體 */}
                                <div className="relative w-72 h-72 rounded-full border-2 border-blue-500/30 flex items-center justify-center bg-slate-900/20 shadow-[0_0_50px_rgba(59,130,246,0.1)] overflow-hidden">
                                    {/* 掃描線 */}
                                    <div className="absolute inset-0 radar-line" style={{ background: 'conic-gradient(from 0deg, transparent, rgba(59,130,246,0.2))' }}></div>
                                    
                                    {/* 中心點 */}
                                    <div className="w-3 h-3 bg-white rounded-full shadow-[0_0_10px_white] z-10"></div>
                                    
                                    {/* 裝飾網格 */}
                                    <div className="absolute inset-0 opacity-10" style={{backgroundImage: 'radial-gradient(circle, #3b82f6 1px, transparent 1px)', backgroundSize: '20px 20px'}}></div>
                                </div>

                                <div className="mt-10 grid grid-cols-2 gap-4 w-full max-w-sm">
                                    <div className="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                                        <p className="text-[10px] text-slate-500 uppercase font-bold">任務頻道</p>
                                        <p className="font-mono text-blue-400">{missionId}</p>
                                    </div>
                                    <div className="bg-slate-900 p-4 rounded-2xl border border-slate-800">
                                        <p className="text-[10px] text-slate-500 uppercase font-bold">當前座標</p>
                                        <p className="font-mono text-xs">{userPos.lat.toFixed(3)}, {userPos.lng.toFixed(3)}</p>
                                    </div>
                                </div>
                                <p className="mt-8 text-slate-500 text-xs animate-pulse">正在等待管理員投放寶藏...</p>
                                <button onClick={() => setView('admin')} className="mt-4 text-[10px] text-slate-700">管理員登入</button>
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="w-full max-w-sm bg-slate-900 p-6 rounded-3xl border border-slate-800 space-y-4">
                                <h2 className="text-xl font-bold flex items-center gap-2">
                                    <span className="w-2 h-2 bg-red-500 rounded-full"></span> 投放控制台
                                </h2>
                                <div className="grid grid-cols-3 gap-2">
                                    {['🎁', '💰', '💎', '👑', '🗺️', '🔥'].map(item => (
                                        <button 
                                            key={item}
                                            className="bg-slate-800 aspect-square rounded-xl text-2xl hover:bg-slate-700 active:scale-90 transition-all"
                                            onClick={() => alert('已投放: ' + item)}
                                        >
                                            {item}
                                        </button>
                                    ))}
                                </div>
                                <button onClick={() => setView('radar')} className="w-full bg-slate-800 py-3 rounded-xl text-sm">返回雷達</button>
                            </div>
                        )}

                    </main>

                    <footer className="p-4 text-[10px] text-center text-slate-600 font-mono tracking-widest">
                        SECURE SATELLITE LINK // ACTIVE
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
